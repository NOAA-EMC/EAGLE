# Configuration for 1deg GDAS global eagle-solo

data:
  format: zarr
  frequency: 6h
  timestep: 6h
  datasets:
    data:
      forcing:
      - cos_latitude
      - cos_longitude
      - sin_latitude
      - sin_longitude
      - cos_julian_day
      - cos_local_time
      - sin_julian_day
      - sin_local_time
      - insolation
      - lsm
      - orog
      diagnostic:
      - tp
      - cp
      - 100u
      - 100v
      - w_50
      - w_100
      - w_150
      - w_200
      - w_250
      - w_300
      - w_400
      - w_500
      - w_600
      - w_700
      - w_850
      - w_925
      - w_1000
      processors:
        normalizer:
          _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
          config:
            default: mean-std
            std:
            - tp
            - q_50
            - q_100
            - q_150
            - q_200
            - q_250
            - q_300
            - q_400
            - q_500
            - q_600
            - q_700
            - q_850
            - q_925
            - q_1000
            min-max: null
            max:
            - orog
            none:
            - cos_latitude
            - cos_longitude
            - sin_latitude
            - sin_longitude
            - cos_julian_day
            - cos_local_time
            - sin_julian_day
            - sin_local_time
            - insolation
            - lsm
  num_features: null
  resolution: 1p0
dataloader:
  prefetch_factor: 2
  pin_memory: true
  read_group_size: ${system.hardware.num_gpus_per_model}
  num_workers:
    training: 8
    validation: 8
    test: 8
  batch_size:
    training: 1
    validation: 1
    test: 1
  limit_batches:
    training: null
    validation: null
    test: 20
  dataset: ${system.input.dataset}
  model_run_info: null
  training:
    datasets:
      data:
        dataset_config:
          dataset: ${dataloader.dataset}
          frequency: ${data.frequency}
          drop: []
        start: '2021-04-01'
        end: '2024-03-31'
        trajectory: ${dataloader.model_run_info}
  validation_rollout: 1
  validation:
    datasets:
      data:
        dataset_config:
          dataset: ${dataloader.dataset}
          frequency: ${data.frequency}
          drop: []
        start: '2024-04-01'
        end: '2025-03-31'
        trajectory: ${dataloader.model_run_info}
  test:
    datasets:
      data:
        dataset_config:
          dataset: ${dataloader.dataset}
          frequency: ${data.frequency}
          drop: []
        start: '2025-04-01'
        end: '2025-08-31'
        trajectory: ${dataloader.model_run_info}
diagnostics:
  plot:
    asynchronous: true
    datashader: true
    projection_kind: equirectangular
    frequency:
      batch: 750
      epoch: 5
    parameters:
    - z_500
    - t_850
    - u_850
    - v_850
    - 2t
    - 10u
    - 10v
    - sp
    - tp
    sample_idx: 0
    precip_and_related_fields:
    - tp
    colormaps:
      default:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormap
        name: viridis
      error:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormap
        name: bwr
      precip:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormapClevels
        clevels:
        - '#ffffff'
        - '#04e9e7'
        - '#019ff4'
        - '#0300f4'
        - '#02fd02'
        - '#01c501'
        - '#008e00'
        - '#fdf802'
        - '#e5bc00'
        - '#fd9500'
        - '#fd0000'
        - '#d40000'
        - '#bc0000'
        - '#f800fd'
        variables: ${diagnostics.plot.precip_and_related_fields}
    datasets_to_plot:
    - data
    focus_areas:
      europe:
        latlon_bbox:
        - 30.0
        - -20.0
        - 60.0
        - 40.0
      china:
        latlon_bbox:
        - 18.0
        - 73.0
        - 54.0
        - 135.0
    callbacks:
    - _target_: anemoi.training.diagnostics.callbacks.plot.GraphTrainableFeaturesPlot
      every_n_epochs: 5
      dataset_names: ${diagnostics.plot.datasets_to_plot}
    - _target_: anemoi.training.diagnostics.callbacks.plot.PlotLoss
      dataset_names: ${diagnostics.plot.datasets_to_plot}
      parameter_groups:
        moisture:
        - tp
        sfc_wind:
        - 10u
        - 10v
      every_n_batches: ${diagnostics.plot.frequency.batch}
    - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSample
      dataset_names: ${diagnostics.plot.datasets_to_plot}
      sample_idx: ${diagnostics.plot.sample_idx}
      per_sample: 6
      parameters: ${diagnostics.plot.parameters}
      output_steps: ${training.multistep_output}
      every_n_batches: ${diagnostics.plot.frequency.batch}
      accumulation_levels_plot:
      - 0
      - 0.05
      - 0.1
      - 0.25
      - 0.5
      - 1
      - 1.5
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 100
      precip_and_related_fields: ${diagnostics.plot.precip_and_related_fields}
      colormaps: ${diagnostics.plot.colormaps}
      focus_area: null
    - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSpectrum
      dataset_names: ${diagnostics.plot.datasets_to_plot}
      sample_idx: ${diagnostics.plot.sample_idx}
      output_steps: ${training.multistep_output}
      every_n_batches: ${diagnostics.plot.frequency.batch}
      parameters:
      - z_500
      - tp
      - 2t
      - 10u
      - 10v
    - _target_: anemoi.training.diagnostics.callbacks.plot.PlotHistogram
      dataset_names: ${diagnostics.plot.datasets_to_plot}
      sample_idx: ${diagnostics.plot.sample_idx}
      output_steps: ${training.multistep_output}
      every_n_batches: ${diagnostics.plot.frequency.batch}
      precip_and_related_fields: ${diagnostics.plot.precip_and_related_fields}
      parameters:
      - z_500
      - tp
      - 2t
      - 10u
      - 10v
  callbacks: []
  benchmark_profiler:
    memory:
      enabled: true
      steps: 5
      warmup: 2
      extra_plots: false
      trace_rank0_only: false
    time:
      enabled: true
      verbose: false
    speed:
      enabled: true
    system:
      enabled: true
    model_summary:
      enabled: true
    snapshot:
      enabled: true
      steps: 4
      warmup: 0
  log:
    mlflow:
      enabled: true
      _target_: anemoi.training.diagnostics.mlflow.logger.AnemoiMLflowLogger
      offline: true
      authentication: false
      tracking_uri: file:./mlruns
      experiment_name: anemoi-debug
      project_name: Anemoi
      system: false
      terminal: true
      run_name: gdas_1p0_run08_weightedmse_300k_lr
      on_resume_create_child: true
      expand_hyperparams:
      - config
      http_max_retries: 35
      max_params_length: 2000
      save_dir: ${system.output.logs.mlflow}
    interval: 100
  debug:
    anomaly_detection: false
  enable_checkpointing: true
  checkpoint:
    every_n_minutes:
      save_frequency: 30
      num_models_saved: 3
    every_n_epochs:
      save_frequency: 1
      num_models_saved: -1
    every_n_train_steps:
      save_frequency: null
      num_models_saved: 0
  enable_progress_bar: true
  progress_bar:
    _target_: pytorch_lightning.callbacks.TQDMProgressBar
    refresh_rate: 1
  check_val_every_n_epoch: 1
  print_memory_summary: false
system:
  output:
    root: /lustre/aigfs/anemoi-test
    logs:
      root: logs
      wandb: wandb
      mlflow: mlflow
      tensorboard: tensorboard
    checkpoints:
      root: checkpoint
      every_n_epochs: anemoi-by_epoch-epoch_{epoch:03d}-step_{step:06d}
      every_n_train_steps: anemoi-by_step-epoch_{epoch:03d}-step_{step:06d}
      every_n_minutes: anemoi-by_time-epoch_{epoch:03d}-step_{step:06d}
    plots: plots
    profiler: profiler
  input:
    dataset: /lustre/training_data/gdas_20210323_20250831_1p00_L13.zarr
    graph: eagle_global/graph_transformer_gdas_${data.resolution}_cutoff0p8.pt
    truncation: null
    truncation_inv: null
    loss_matrices_path: null
    warm_start: null
  hardware:
    accelerator: auto
    num_gpus_per_node: 8
    num_nodes: 1
    num_gpus_per_model: 1
graph:
  overwrite: true
  nodes:
    data:
      node_builder:
        _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
        dataset: ${dataloader.training.datasets.data.dataset_config}
      attributes: ${graph.attributes.nodes}
    hidden:
      node_builder:
        _target_: anemoi.graphs.nodes.ReducedGaussianGridNodes
        grid: o48
  edges:
  - source_name: data
    target_name: hidden
    edge_builders:
    - _target_: anemoi.graphs.edges.CutOffEdges
      cutoff_factor: 0.8
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  - source_name: hidden
    target_name: data
    edge_builders:
    - _target_: anemoi.graphs.edges.KNNEdges
      num_nearest_neighbours: 3
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  attributes:
    nodes:
      area_weight:
        _target_: anemoi.graphs.nodes.attributes.IsolatitudeAreaWeights
        norm: unit-max
    edges:
      edge_length:
        _target_: anemoi.graphs.edges.attributes.EdgeLength
        norm: unit-std
      edge_dirs:
        _target_: anemoi.graphs.edges.attributes.EdgeDirection
        norm: unit-std
  post_processors: []
model:
  num_channels: 512
  cpu_offload: false
  keep_batch_sharded: true
  model:
    _target_: anemoi.models.models.AnemoiModelEncProcDec
    hidden_nodes_name: hidden
    latent_skip: true
  layer_kernels:
    LayerNorm:
      _target_: torch.nn.LayerNorm
    Linear:
      _target_: torch.nn.Linear
    Activation:
      _target_: torch.nn.GELU
    QueryNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
    KeyNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
  processor:
    _target_: anemoi.models.layers.processor.TransformerProcessor
    num_layers: 8
    num_chunks: 4
    mlp_hidden_ratio: 2
    num_heads: 8
    window_size: 512
    dropout_p: 0.1
    attention_implementation: flash_attention
    qk_norm: false
    softcap: 0.0
    use_alibi_slopes: false
    cpu_offload: ${model.cpu_offload}
    gradient_checkpointing: true
    use_rotary_embeddings: false
    layer_kernels: ${model.layer_kernels}
  encoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
    trainable_size: ${model.trainable_parameters.data2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 4
    mlp_hidden_ratio: 2
    num_heads: 16
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    gradient_checkpointing: true
    layer_kernels: ${model.layer_kernels}
    shard_strategy: edges
    graph_attention_backend: triton
  decoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
    trainable_size: ${model.trainable_parameters.hidden2data}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 4
    mlp_hidden_ratio: 2
    num_heads: 16
    initialise_data_extractor_zero: false
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    gradient_checkpointing: true
    layer_kernels: ${model.layer_kernels}
    shard_strategy: edges
    graph_attention_backend: triton
  residual:
    _target_: anemoi.models.layers.residual.SkipConnection
    step: -1
  output_mask:
    _target_: anemoi.training.utils.masks.NoOutputMask
  trainable_parameters:
    data: 8
    hidden: 8
    data2hidden: 8
    hidden2data: 8
  attributes:
    edges:
    - edge_length
    - edge_dirs
    nodes: []
  compile:
  - module: anemoi.models.layers.conv.GraphTransformerConv
  bounding:
  - _target_: anemoi.models.layers.bounding.ReluBounding
    variables:
    - tp
training:
  scalers:
    datasets:
      data:
        general_variable:
          _target_: anemoi.training.losses.scalers.GeneralVariableLossScaler
          weights:
            default: 1
            q: 0.6
            t: 6
            u: 0.8
            v: 0.5
            w: 0.001
            z: 12
            sp: 10
            10u: 0.1
            10v: 0.1
            2d: 0.5
            tp: 0.025
            cp: 0.0025
        pressure_level:
          _target_: anemoi.training.losses.scalers.ReluVariableLevelScaler
          group: pl
          y_intercept: 0.2
          slope: 0.001
        nan_mask_weights:
          _target_: anemoi.training.losses.scalers.NaNMaskScaler
        stdev_tendency:
          _target_: anemoi.training.losses.scalers.StdevTendencyScaler
          timestep: ${data.timestep}
        var_tendency:
          _target_: anemoi.training.losses.scalers.VarTendencyScaler
          timestep: ${data.timestep}
        node_weights:
          _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
          nodes_attribute_name: area_weight
          norm: unit-sum
        time_steps:
          _target_: anemoi.training.losses.scalers.UniformTimeStepScaler
          multistep_output: ${training.multistep_output}
  run_id: null
  fork_run_id: null
  transfer_learning: false
  load_weights_only: false
  update_ds_stats_on_ckpt_load:
    states: false
    tendencies: true
  deterministic: false
  precision: 16-mixed
  multistep_input: 2
  multistep_output: 1
  accum_grad_batches: 1
  num_sanity_val_steps: 6
  gradient_clip:
    val: 32.0
    algorithm: value
  swa:
    enabled: false
    lr: 0.0001
  optimizer:
    _target_: torch.optim.AdamW
    betas:
    - 0.9
    - 0.95
  model_task: anemoi.training.train.tasks.GraphForecaster
  strategy:
    _target_: anemoi.training.distributed.strategy.DDPGroupStrategy
    num_gpus_per_model: ${system.hardware.num_gpus_per_model}
    read_group_size: ${dataloader.read_group_size}
  loss_gradient_scaling: false
  training_loss:
    datasets:
      data:
        _target_: anemoi.training.losses.WeightedMSELoss
        scalers:
        - pressure_level
        - general_variable
        - node_weights
        - time_steps
        ignore_nans: false
  validation_metrics:
    datasets:
      data:
        mse:
          _target_: anemoi.training.losses.WeightedMSELoss
          scalers:
          - node_weights
          - time_steps
          ignore_nans: true
  variable_groups:
    datasets:
      data:
        default: sfc
        pl:
          param:
          - q
          - t
          - u
          - v
          - w
          - z
  metrics:
    datasets:
      data:
      - z_500
      - t_850
      - u_850
      - v_850
  rollout:
    start: 1
    epoch_increment: 0
    max: 1
  max_epochs: null
  max_steps: 300000
  lr:
    warmup: 1000
    rate: 0.000625
    iterations: ${training.max_steps}
    min: 3.0e-05
  submodules_to_freeze: []
  recompile_limit: 32
config_validation: true
